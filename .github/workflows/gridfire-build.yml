name: Gridfire Build

# gridfire_template_version: stage3-ts-react/v1

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or ref generated by Gridfire.
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout generated ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
