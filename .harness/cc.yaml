version: "1"

# gridfire_template_version: stage3-ts-react/v1

github:
  owner: BrettHamlin
  repo: inky

reviewer_dispatch:
  strategy: progressive
  clustering:
    mode: lsp_preferred
    regex_fallback: true

reviewers:
  - name: react-state-contracts
    file: .harness/agents/react-state-contracts.md
    description: Checks React/TypeScript state, persistence, filtering, and UI contract behavior.
    path_hints: ["src/**", "**/*.ts", "**/*.tsx"]
    language_hints: [typescript, tsx]
    mandatory_triggers: ["state", "localStorage", "filter", "search", "archive", "tag", "form", "validation"]
    passing_grade: C
    max_retries: 5

  - name: accessibility-ux
    file: .harness/agents/accessibility-ux.md
    description: Checks keyboard access, ARIA semantics, focus behavior, responsive UI, and user-visible copy.
    path_hints: ["src/components/**", "src/App.tsx", "**/*.tsx", "**/*.css"]
    language_hints: [typescript, tsx, css]
    mandatory_triggers: ["button", "input", "dialog", "aria", "keyboard", "focus", "mobile", "responsive"]
    passing_grade: C
    max_retries: 5

codegen:
  cli_provider: codex-cli
  default_model: gpt-5.5

stages:
  planner:
    explore_model: gpt-5.5
  code_gen_feature:
    model: gpt-5.5
    timeout_s: 21600
  code_gen_test:
    model: gpt-5.5
  code_gen_e2e_test:
    model: gpt-5.5
    timeout_s: 21600

ci:
  provider: github-actions
  build:
    workflow: ".github/workflows/gridfire-build.yml"
    timeout_sec: 1800
  test:
    workflow: ".github/workflows/gridfire-test.yml"
    timeout_sec: 1800
  failure_extraction:
    - source: annotations
    - source: junit-xml
      path: "test-results/*.xml"
    - source: ai-extract

gates:
  plan:
    auto_approve: true
  ac:
    auto_approve: true
  merge_review:
    auto_approve: true

inner_loop:
  reviewer_per_max: 2
  reviewer_total_max: 5
  build_max: 3
  test_max: 3
  build_test_total_max: 5
  budget_reset_on_user_changes: true
